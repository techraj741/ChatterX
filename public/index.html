<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatterX - Anonymous Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">

    <!-- =========================
             NAVBAR
    ========================== -->
    <div class="navbar">
      <div class="nav-left">
        <div class="logo">💬</div>

        <h2 class="brand">
          <span class="chatter">Chatter</span><span class="x">X</span>
        </h2>
      </div>

      <div class="nav-right" id="navMenu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="help.html">Help</a>

        <div class="menu-footer">© 2026 ChatterX</div>
      </div>

      <div class="menu-backdrop-nav" id="navBackdrop"></div>
      <div class="menu-toggle" id="menuToggle">☰</div>
    </div>

    <!-- =========================
          WELCOME SCREEN
    ========================== -->
    <div id="welcomeScreen" class="screen active-screen">
      <div class="app-header welcome-header">
        <div>
          <h1>ChatterX</h1>
          <p class="subheading">Talk instantly with strangers</p>
        </div>
      </div>

      <div class="welcome-card">
        <h2 class="welcome-title">Start a new anonymous chat</h2>

        <p class="welcome-text">
          Add interests if you want better matching, or start directly.
        </p>

        <!-- =========================
              INTEREST INPUT
        ========================== -->
        <div class="interest-box">
          <div class="interest-container">
            <div id="interestTags"></div>

            <input
              type="text"
              id="interestInput"
              placeholder="Type interest and press Enter"
            />
          </div>

          <button id="startBtn">Start Chat</button>
        </div>
      </div>
    </div>

    <!-- =========================
             CHAT SCREEN
    ========================== -->
    <div id="chatScreen" class="screen hidden">
      <div class="app-header chat-header">
        <div>
          <h1>ChatterX</h1>
          <p class="subheading">Talk instantly with strangers</p>
        </div>
      </div>

      <!-- =========================
            FLOATING CONTROLS
      ========================== -->
      <div class="floating-controls">
        <button id="backBtn" class="back-btn">←</button>

        <div class="theme-toggle chat-theme-toggle">
          <input type="checkbox" id="themeSwitch" />

          <label for="themeSwitch" class="toggle">
            <span class="icon sun">☀️</span>
            <span class="icon moon">🌙</span>
            <span class="ball"></span>
          </label>
        </div>
      </div>

      <!-- =========================
                STATUS
      ========================== -->
      <div class="status-row">
        <span id="statusDot" class="status-dot disconnected"></span>
        <span id="status">Not connected</span>
      </div>

      <div id="onlineUsers" class="online-users">
        Users online: 0
      </div>

      <!-- =========================
               CHAT BOX
      ========================== -->
      <div id="chatBox">
        <div id="chatPlaceholder" class="chat-placeholder">
          Start a chat to see messages here
        </div>
      </div>

      <!-- =========================
           TYPING INDICATOR
      ========================== -->
      <div id="typingIndicator" class="typing-indicator hidden">
        <span>Typing</span>

        <div class="typing-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <!-- =========================
             FILE PREVIEW
      ========================== -->
      <div id="filePreview" class="file-preview hidden"></div>

      <!-- =========================
              INPUT AREA
      ========================== -->
      <div class="input-area">
        <div id="menuBackdrop" class="menu-backdrop hidden"></div>

        <div class="input-box">
          <button id="plusBtn" class="plus-btn">+</button>

          <input
            type="text"
            id="messageInput"
            placeholder="Type message..."
          />

          <button id="sendBtn">Send</button>
          <button id="nextBtn">Next</button>
        </div>

        <!-- =========================
               ACTION MENU
        ========================== -->
        <div id="actionMenu" class="action-menu hidden">
          <button id="photoOption" class="action-item disabled-action">
            Upload Photo
          </button>

          <button id="videoOption" class="action-item disabled-action">
            Upload Video
          </button>

          <button id="reportOption" class="action-item danger-action">
            Report User
          </button>
        </div>
      </div>

      <!-- =========================
              FILE INPUT
      ========================== -->
      <input
        type="file"
        id="fileInput"
        accept="image/*,video/mp4,video/webm,video/quicktime"
        hidden
      />
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
